
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">


<style>
body{
font-family:Arial, sans-serif;
margin:0;
background:#f4f4f4;
font-size:14px;
}

.container{
max-width:480px;
margin:auto;
background:white;
padding:10px;
padding-bottom:140px;
box-sizing:border-box;
}

h1{
margin:5px 0 10px 0;
font-size:20px;
}

.top input,.top select{
width:100%;
padding:10px;
margin-bottom:6px;
font-size:16px;
box-sizing:border-box;
}

.projectRow{
display:flex;
gap:2px;
}

.projectRow select{flex:1;}
.projectRow button{width:40%;}

.header,.row{
display:grid;
grid-template-columns:45px 1fr 65px 65px 60px;
gap:0px;
align-items:stretch;
}

.header{
background:#ddd;
font-weight:bold;
font-size:13px;
padding:6px 0;
text-align:center;
}

.row>*{
min-width:0;
}

.row textarea,
.row input,
.row select{
width:100%;
padding:4px;
font-size:14px;
height:34px;
box-sizing:border-box;
word-break:keep-all;
overflow-wrap:normal;
white-space:normal;
}

.item{
word-break:keep-all;
white-space:normal;
}
  
.row textarea{
height:34px;
font-weight:bold;
resize:none;
line-height:16px;
}

.footer{
position:fixed;
bottom:0;
left:0;
right:0;
max-width:480px;
margin:auto;
background:white;
box-shadow:0 -2px 6px rgba(0,0,0,0.2);
}

.totalBar{
background:#e0e0e0;
text-align:center;
font-size:22px;
font-weight:bold;
padding:10px;
}

.markup{
text-align:center;
padding:6px;
font-weight:bold;
}

.markup{
text-align:center;
padding:6px;
font-weight:bold;
}

.buttonRow{
display:flex;
}

.buttonRow button{
flex:1;
padding:10px;
font-weight:bold;
font-size:13px;
}  
  

</style>
</head>

<body>

<div class="container">



<div class="top">
<input id="property" placeholder="PROPERTY / CLIENT">

<div class="projectRow">
<select id="project">
<option value="">PROJECT TYPE</option>
<option>WUD</option>
<option>SPUD</option>
<option>SUD</option>
<option>FUD</option>
<option>BULBS</option>
<option>ANNUALS</option>
</select>


</div>
</div>

<div class="header">
<div>QTY</div>
<div>ITEM</div>
<div>SIZE</div>
<div>COST</div>
<div>TOTAL</div>
</div>

<div id="rows"></div>

</div>

<div class="footer">
<div id="grandTotal" class="totalBar">$0.00 CAD</div>
<div id="markupTotal" class="markup">$0.00 CAD (50% Markup)</div>

<div class="buttonRow">
<button onclick="saveJob()">SAVE</button>
<button onclick="loadJob()">LOAD</button>

<button onclick="newJob()">NEW</button>
</div>

</div>

<script>

const rowsContainer=document.getElementById("rows");

for(let i=0;i<40;i++){
const row=document.createElement("div");
row.className="row";

row.innerHTML=`
<input class="qty" type="number" inputmode="numeric" max="999">
<textarea class="item"></textarea>
<select class="size">
<option value=""></option>
<option>2"</option>
<option>4"</option>
<option>4.5"</option>
<option>5"</option>
<option>6"</option>
<option>8"</option>
<option>10"</option>
<option>12"</option>
<option>14"</option>
<option>6HB</option>
<option>10HB</option>
<option>PHB</option>
</select>
<input class="cost" type="number" step="0.01">
<input class="total" type="text">
`;

rowsContainer.appendChild(row);
}

function updateTotals(){
let grand=0;

document.querySelectorAll(".row").forEach(r=>{
let q=parseFloat(r.querySelector(".qty").value)||0;
let c=parseFloat(r.querySelector(".cost").value)||0;
let t=q*c;

r.querySelector(".total").value=t?t.toFixed(2):"";
grand+=t;
});

document.getElementById("grandTotal").innerText="$"+grand.toFixed(2)+" CAD";
document.getElementById("markupTotal").innerText="$"+(grand*1.5).toFixed(2)+" CAD (50% Markup)";
}

document.addEventListener("input",updateTotals);
document.addEventListener("change",updateTotals);
document.addEventListener("keyup",updateTotals);

function newJob(){
document.querySelectorAll("input,textarea,select").forEach(e=>e.value="");
updateTotals();
}

function getJobData(){
let rows=[];
document.querySelectorAll(".row").forEach(r=>{
rows.push({
qty:r.querySelector(".qty").value,
item:r.querySelector(".item").value,
size:r.querySelector(".size").value,
cost:r.querySelector(".cost").value
});
});
return {
property:document.getElementById("property").value,
project:document.getElementById("project").value,
rows:rows
};
}

function loadJobData(data){
document.getElementById("property").value=data.property||"";
document.getElementById("project").value=data.project||"";

document.querySelectorAll(".row").forEach((r,i)=>{
if(data.rows[i]){
r.querySelector(".qty").value=data.rows[i].qty;
r.querySelector(".item").value=data.rows[i].item;
r.querySelector(".size").value=data.rows[i].size;
r.querySelector(".cost").value=data.rows[i].cost;
}else{
r.querySelector(".qty").value="";
r.querySelector(".item").value="";
r.querySelector(".size").value="";
r.querySelector(".cost").value="";
}
});

updateTotals();
}

function saveJob(){

let base=document.getElementById("property").value.trim();

if(!base){
alert("Enter property name first");
return;
}

/* check if property already contains a date */
let dateMatch=base.match(/ - [A-Za-z]+ \d{2} \d{4}$/);

let name;

if(dateMatch){
/* job already has a date → keep it */
name=base;
}else{

/* first save → create date */
let d=new Date();
let date=d.toLocaleDateString("en-US",{month:"long",day:"2-digit",year:"numeric"}).replace(",","");

let project=document.getElementById("project").value || "";
name=base+" - "+date+(project ? " - "+project : "");

/* update the property field so the user sees the locked date */
document.getElementById("property").value=name;

}

localStorage.setItem("job_"+name,JSON.stringify(getJobData()));

alert("Saved: "+name);

}
  
function loadJob(){

let search=prompt("Search job:");
if(!search) return;

let matches=[];

for(let i=0;i<localStorage.length;i++){
let key=localStorage.key(i);

if(key.startsWith("job_")){
let name=key.replace("job_","");

if(name.toLowerCase().includes(search.toLowerCase())){
matches.push(name);
}
}
}

if(matches.length===0){
alert("No jobs found");
return;
}

matches.sort().reverse();

let list="Select job:\n\n";

matches.forEach((job,i)=>{
list+=(i+1)+". "+job+"\n";
});

let choice=prompt(list+"\nEnter number:");

if(!choice) return;

let index=parseInt(choice)-1;

if(index<0 || index>=matches.length){
alert("Invalid selection");
return;
}

let data=localStorage.getItem("job_"+matches[index]);

loadJobData(JSON.parse(data));

}
  
function deleteJob(){
let name=prompt("Enter property name to delete:");
if(!name)return;

localStorage.removeItem("job_"+name);
alert("Job deleted");
}

</script>

</body>
</html>
