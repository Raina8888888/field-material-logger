
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">


<style>
body{
font-family:Arial, sans-serif;
margin:0;
background:#f4f4f4;
}

.container{
max-width:480px;
margin:auto;
background:white;
padding:10px;
padding-bottom:140px;
box-sizing:border-box;
}

h1{
margin:5px 0 10px 0;
font-size:20px;
}

.top input,.top select{
width:100%;
padding:10px;
margin-bottom:6px;
font-size:16px;
box-sizing:border-box;
}

.projectRow{
display:flex;
gap:6px;
}

.projectRow select{flex:1;}
.projectRow button{width:40%;}

.header,.row{
display:grid;
grid-template-columns:45px 1fr 65px 65px 60px;
gap:6px;
align-items:stretch;
}

.header{
background:#ddd;
font-weight:bold;
font-size:13px;
padding:6px 0;
text-align:center;
}

.row>*{
min-width:0;
}

.row textarea,
.row input,
.row select{
width:100%;
padding:8px;
font-size:15px;
box-sizing:border-box;
}

.row textarea{
height:40px;
font-weight:bold;
resize:none;
}

.footer{
position:fixed;
bottom:0;
left:0;
right:0;
max-width:480px;
margin:auto;
background:white;
box-shadow:0 -2px 6px rgba(0,0,0,0.2);
}

.totalBar{
background:#e0e0e0;
text-align:center;
font-size:22px;
font-weight:bold;
padding:10px;
}

.markup{
text-align:center;
padding:6px;
font-weight:bold;
}

button{
width:100%;
padding:10px;
font-weight:bold;
font-size:14px;
}
</style>
</head>

<body>

<div class="container">

<h1>Field Material Logger</h1>

<div class="top">
<input id="property" placeholder="PROPERTY / CLIENT">

<div class="projectRow">
<select id="project">
<option value="">PROJECT TYPE</option>
<option>WUD</option>
<option>SPUD</option>
<option>SUD</option>
<option>FUD</option>
<option>BULBS</option>
<option>ANNUALS</option>
</select>

<button onclick="toggleContrast()">Contrast</button>
</div>
</div>

<div class="header">
<div>QTY</div>
<div>ITEM</div>
<div>SIZE</div>
<div>COST</div>
<div>TOTAL</div>
</div>

<div id="rows"></div>

</div>

<div class="footer">
<div id="grandTotal" class="totalBar">$0.00 CAD</div>
<div id="markupTotal" class="markup">$0.00 CAD (50% Markup)</div>
<button onclick="newJob()">NEW JOB</button>
</div>

<script>

const rowsContainer=document.getElementById("rows");

for(let i=0;i<20;i++){
const row=document.createElement("div");
row.className="row";

row.innerHTML=`
<input class="qty" type="number" inputmode="numeric" max="999">
<textarea class="item"></textarea>
<select class="size">
<option value=""></option>
<option>2"</option>
<option>4"</option>
<option>4.5"</option>
<option>5"</option>
<option>6"</option>
<option>8"</option>
<option>10"</option>
<option>12"</option>
<option>14"</option>
<option>6HB</option>
<option>10HB</option>
<option>PHB</option>
</select>
<input class="cost" type="number" step="0.01">
<input class="total" type="text">
`;

rowsContainer.appendChild(row);
}

function updateTotals(){
let grand=0;

document.querySelectorAll(".row").forEach(r=>{
let q=parseFloat(r.querySelector(".qty").value)||0;
let c=parseFloat(r.querySelector(".cost").value)||0;
let t=q*c;

r.querySelector(".total").value=t?t.toFixed(2):"";
grand+=t;
});

document.getElementById("grandTotal").innerText="$"+grand.toFixed(2)+" CAD";
document.getElementById("markupTotal").innerText="$"+(grand*1.5).toFixed(2)+" CAD (50% Markup)";
}

document.addEventListener("input",updateTotals);
document.addEventListener("change",updateTotals);
document.addEventListener("keyup",updateTotals);

function newJob(){
document.querySelectorAll("input,textarea,select").forEach(e=>e.value="");
updateTotals();
}

function toggleContrast(){
document.body.classList.toggle("dark");
}

</script>

</body>
</html>
